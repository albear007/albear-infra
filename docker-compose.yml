name: albear-infra

services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Caddyfile + snippets/ — the Caddyfile.prod uses `import snippets/*.caddy`
      # so the whole caddy/ tree must be mounted (not just the top-level file).
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./caddy/snippets:/etc/caddy/snippets:ro
      - ./certs:/etc/caddy/certs:ro
      - /home/ubuntu/albear-t/static:/srv/static:ro
      - /home/ubuntu/albear-t/dist:/srv/dist:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      # Verify Caddy is listening on :80. The admin endpoint on localhost:2019
      # is unreachable from busybox tools in this image (default binding
      # behavior); TCP probe of the public port confirms Caddy is up without
      # tripping on HTTPS redirect / cert chain issues that wget --spider hits.
      test: ["CMD", "nc", "-z", "-w", "3", "127.0.0.1", "80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
