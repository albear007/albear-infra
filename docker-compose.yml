name: albear-infra

services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Caddyfile + snippets/ — the Caddyfile.prod uses `import snippets/*.caddy`
      # so the whole caddy/ tree must be mounted (not just the top-level file).
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./caddy/snippets:/etc/caddy/snippets:ro
      - ./certs:/etc/caddy/certs:ro
      - /home/ubuntu/albear-t/static:/srv/static:ro
      - /home/ubuntu/albear-t/dist:/srv/dist:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      # Hit the public HTTP listener — Caddy's :80 always responds (HTTP→HTTPS
      # redirect for configured sites). The admin endpoint is bound to
      # localhost-only inside the container in a way busybox wget can't always
      # reach, so testing the public port is more reliable.
      test: ["CMD-SHELL", "wget -qO- --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
